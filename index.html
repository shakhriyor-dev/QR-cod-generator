<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro QR Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>QR Kod Generatori</h1>
        <p>Ma'lumot kiriting va rangni tanlang</p>
        
        <div class="input-group">
            <input type="text" id="text-input" placeholder="Masalan: https://github.com/siz">
            
            <div class="settings">
                <div class="color-picker">
                    <label for="color-input">Kod rangi:</label>
                    <input type="color" id="color-input" value="#000000">
                </div>
            </div>

            <button id="generate-btn">QR Kodni yaratish</button>
        </div>

        <div id="qrcode"></div>

        <button id="download-btn" class="download-btn">PNG formatda yuklab olish</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
